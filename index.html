        function init_jsmind() {
            let mind_data = default_mind;

                const local = localStorage.getItem(STORAGE_KEY);
                if (local) {
                    const parsed = JSON.parse(local);
                    // 强制检查 meta 信息
                    if (parsed && parsed.data && parsed.meta) {

                    }
                }

            const options = {

                view: {
                    engine: 'canvas',
                    draggable: true,
                    enable_device_pixel_ratio: false,
                },
                shortcut: { enable: true }
            };
            _jm = new jsMind(options);
            _jm.show(mind_data);

            // 在 init_jsmind 函数内部
            _jm.add_event_listener((type, data) => {
                if (type === jsMind.event_type.select) {
                    // data.node 只是 ID 字符串，我们需要用它获取真正的 node 对象

                    const selectedNode = _jm.get_node(nodeId);

                    console.log('真正的节点对象:', selectedNode);

                    // 现在传给编辑器的是完整的对象了
                    show_editor(selectedNode);
                }
            });
        }

        function apply_changes() {
            const node = _jm.get_selected_node();
            if (!node) {
                alert('请先选择一个节点');
                return;
            }

            const topic = document.getElementById('edit-topic').value || '&nbsp;';
            const imgUrl = document.getElementById('edit-image').value.trim();
            const note = document.getElementById('edit-note').value;

            // 1. 更新 note 数据（如果有 note 插件，这会自动在渲染时加上标记）
            var editable = _jm.get_editable();
            if (!editable) {
                // 如果是只读模式，弹出警告并直接返回，不执行保存
                alert('⚠️ 当前处于“只读模式”，无法保存修改。');
                return;
            }
            // 2. 如果有图片地址
            else {
                node.data['note'] = note;
                if (imgUrl) {
                    const tempImg = new Image();
                    tempImg.src = imgUrl;

                    tempImg.onload = function () {
                        const MAX_W = 200;
                        const MAX_H = 150;
                        let targetW = tempImg.naturalWidth;
                        let targetH = tempImg.naturalHeight;
                        let ratio = targetW / targetH;

                        // 比例缩放逻辑
                        if (targetW > MAX_W) {
                            targetW = MAX_W;
                            targetH = targetW / ratio;
                        }
                        if (targetH > MAX_H) {
                            targetH = MAX_H;
                            targetW = targetH * ratio;
                        }

                        // 【关键步骤】使用官方 API 设置图片
                        // 这会自动处理 node.data['background-image'] 等字段
                        _jm.set_node_background_image(node.id, imgUrl, Math.round(targetW + 20), Math.round(targetH + 20));

                        // 【关键步骤】强制更新节点内容和 Note 状态
                        _jm.update_node(node.id, topic);

                        // 重新计算布局（防止节点重叠）
                        _jm.resize();

                        save_to_local();
                        console.log(targetW, targetH, ratio)
                        console.log('节点已更新：图片 + 文字 + Note');
                    };

                    tempImg.onerror = function () {
                        alert('图片加载失败，请检查链接');
                    };
                } else {
                    // 3. 清除图片逻辑
                    _jm.set_node_background_image(node.id, ''); // 传入 null 清除图片
                    if (node.data) {
                        delete node.data['background-image'];
                        delete node.data['width'];
                        delete node.data['height'];
                    }
                    // 3. 手动干预 DOM 样式（这是最保险的一步）
                    // 因为 update_node 有时不会重置已经被内联设置的 width 和 height
                    const nodeElement = document.querySelector(`jmnode[nodeid="${node.id}"]`);
                    if (nodeElement) {
                        nodeElement.style.backgroundImage = 'none';
                        nodeElement.style.width = '';  // 恢复自动宽度
                        nodeElement.style.height = ''; // 恢复自动高度
                        nodeElement.style.backgroundSize = '';
                        // 如果之前因为图片设置了特定的 class，也可以在这里移除
                    }
                    _jm.update_node(node.id, topic);
                    // _jm.view.update_node(node);
                    _jm.resize();
                    save_to_local();
                }
            }
        }

        // 3. 基础操作
        function add_node() {
            const selected = _jm.get_selected_node() || _jm.get_root();
            const id = 'n' + Date.now();
            var nodeid = jsMind.util.uuid.newid();
            var topic = "新知识点";
            var data = {
                'note': '',
            };
            var node = _jm.add_node(selected, nodeid, topic, data);
            // _jm.add_node(selected, id, "新知识点");
        }

        function remove_node() {
            const selected = _jm.get_selected_node();
            if (selected && !selected.isroot && confirm('确定删除？')) {
                _jm.remove_node(selected);
                // hide_editor();
            }
        }

        function save_to_local() {
            var editable = _jm.get_editable();
            if (!editable) {
                // 如果是只读模式，弹出警告并直接返回，不执行保存
                alert('⚠️ 当前处于“只读模式”，无法保存修改。');
                return;
            }
            const data = _jm.get_data('node_array');
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            alert('✅ 已保存到浏览器缓存');
        }

        function export_json() {
            const data = _jm.get_data('node_array');
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "rs_mindmap.json";
            a.click();
        }

        function reset_all() {
            if (confirm('重置将清空所有内容并恢复默认，确定吗？')) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        // 1. 修改编辑器显示逻辑：点击节点时，如果面板收起了，则自动打开
        function show_editor(node) {
            const panel = document.getElementById('details-panel');
            const btn = document.getElementById('toggle-btn');

            // 如果面板当前是收起状态，强制展开
            if (panel.classList.contains('collapsed')) {
                panel.classList.remove('collapsed');
                btn.innerText = '▶';
                // 调整导图尺寸
                setTimeout(() => { _jm.resize(); }, 310);
            }

            document.getElementById('no-selection').style.display = 'none';
            document.getElementById('editor-form').style.display = 'flex';

            // 数据填充逻辑
            const d = node.data || {};
            document.getElementById('edit-topic').value = node.topic || '';
            document.getElementById('edit-image').value = d['background-image'] || '';
            document.getElementById('edit-note').value = d.note || '';
        }

        // 2. 简约切换函数
        function togglePanel() {
            const panel = document.getElementById('details-panel');
            const btn = document.getElementById('toggle-btn');

            panel.classList.toggle('collapsed');

            // 逻辑：展开显示 ▶ (指向右侧面板收起)，收起显示 ◀ (指向左侧拉出)
            if (panel.classList.contains('collapsed')) {
                btn.innerText = '◀';
            } else {
                btn.innerText = '▶';
            }

        }

        // GitHub 基础配置（不含敏感 Token）
        const GH_CONFIG = {
            repo: 'Pinery-lee/Agri-RS-Census4-Map',       // 需替换为你的：用户名/仓库名
            path: 'data.js',           // 仓库中的文件路径
            branch: 'main'             // 分支名
        };

        async function upload_to_github() {
            // --- 1. 安全获取 Token ---
            let token = localStorage.getItem('gh_token');

            if (!token) {
                token = prompt("🔐 请输入你的 GitHub Personal Access Token (PAT):");
                if (!token) return; // 用户取消输入则终止
                localStorage.setItem('gh_token', token);
            }

            // --- 2. 准备数据 ---
            // 获取 node_array 格式数据并包装成 data.js 格式
            const currentData = _jm.get_data('node_array');
            const fileContent = `var default_mind = ${JSON.stringify(currentData, null, 4)};`;

            // --- 3. 获取旧文件的 SHA (更新文件必须步骤) ---
            let sha = "";
            const url = `https://api.github.com/repos/${GH_CONFIG.repo}/contents/${GH_CONFIG.path}`;

            try {
                const res = await fetch(url, {
                    headers: { "Authorization": `token ${token}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    sha = data.sha;
                }
            } catch (e) {
                console.log("文件可能不存在，将尝试新建");
            }

            // --- 4. 上传更新 ---
            try {
                const putRes = await fetch(url, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${token}`,
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        message: `Update mind data.js: ${new Date().toLocaleString()}`,
                        // 使用 encodeURIComponent + unescape 解决 Base64 中文乱码问题
                        content: btoa(unescape(encodeURIComponent(fileContent))),
                        sha: sha,
                        branch: GH_CONFIG.branch
                    })
                });

                if (putRes.ok) {
                    alert("🚀 云端同步成功！GitHub 已更新。");
                } else {
                    const errorData = await putRes.json();
                    if (putRes.status === 401) {
                        alert("❌ Token 无效，请尝试清除 Token 后重新输入。");
                        localStorage.removeItem('gh_token'); // 自动清除错误 Token
                    } else {
                        alert("❌ 同步失败：" + errorData.message);
                    }
                }
            } catch (err) {
                alert("⚠️ 网络错误，请检查网络或 GitHub 状态");
            }
        }

        // 辅助功能：如果需要更换 Token，可以调用这个
        function clear_gh_token() {
            localStorage.removeItem('gh_token');
            alert("Token 已清除，下次上传将重新要求输入。");
        }

        function screen_shot() {
            _jm.shoot();
        }

        function toggle_drag_mode(btn) {
            var editable = _jm.get_editable();
            if (editable) {
                _jm.disable_edit();

                btn.innerHTML = "🔒 只读模式";
                btn.style.background = "#2c3e50";
            } else {
                _jm.enable_edit();
                btn.innerHTML = "🔓 自由编辑";
                btn.style.background = "var(--btn-green)";
            }
        }

        window.onload = init_jsmind;
